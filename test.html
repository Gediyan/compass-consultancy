<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            line-height: 1.6;
            color: #333;
            background-color: #f5f7fa;
        }

        /* Services Section */
        .services-section {
            padding: 80px 0;
            background: #f5f7fa;
            position: relative;
            z-index: 10;
            overflow: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .section-title h2:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            border-radius: 2px;
        }

        .section-title p {
            color: #7f8c8d;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Services Card */
        .services-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .services-card.active {
            transform: translateY(0);
            opacity: 1;
        }

        /* Category Styles */
        .service-category {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .category-icon {
            font-size: 2rem;
            color: #3498db;
            margin-right: 15px;
        }

        .category-title {
            font-size: 1.8rem;
            color: #2c3e50;
        }

        .category-description {
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.7;
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .service-item {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .service-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            border-color: #3498db;
        }

        .service-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .service-item:hover .service-image {
            transform: scale(1.03);
        }

        .service-name {
            font-size: 1.3rem;
            color: #34495e;
            margin-bottom: 10px;
        }

        .service-description {
            color: #7f8c8d;
            margin-bottom: 15px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .service-features {
            margin: 15px 0;
            padding-left: 20px;
        }

        .service-features li {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
            position: relative;
            list-style-type: none;
        }

        .service-features li:before {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3498db;
        }

        /* Read More Button */
        .read-more-btn {
            display: inline-block;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 30px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .read-more-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        /* Spacer to demonstrate scrolling */
        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #7f8c8d;
            background: #f0f3f6;
        }
    </style>
</head>
<body>
    <div class="spacer">
        Scroll down to see services
    </div>

    <section class="services-section" id="servicesSection">
        <div class="container">
            <div class="section-title">
                <h2>Our Services</h2>
                <p>Discover the comprehensive range of services we offer to meet your needs</p>
            </div>
            
            <div class="services-card" id="servicesCard">
                <!-- Services will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <div class="spacer"></div>

    <script>
        // Sample database - replace with your actual ServiceDB implementation
        const ServiceDB = {
            SERVICE_KEY: 'compass_service_categories',

            // Get all services
            getAll: function() {
                const services = localStorage.getItem(this.SERVICE_KEY);
                return services ? JSON.parse(services) : [];
            },
            
            getAll: function() {
                // For demo purposes, we'll return sample data
                // In your real implementation, this would come from localStorage
                return [
                    {
                        id: '1',
                        title: 'Web Development',
                        icon: 'fas fa-code',
                        description: 'Complete web solutions from simple sites to complex applications',
                        services: [
                            {
                                id: '101',
                                title: 'Frontend Development',
                                description: 'Beautiful, responsive user interfaces built with modern technologies',
                                features: [
                                    'React.js applications',
                                    'Vue.js development',
                                    'Responsive design',
                                    'Performance optimization'
                                ],
                                image: {
                                    dataUrl: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=600&q=80'
                                }
                            },
                            {
                                id: '102',
                                title: 'Backend Development',
                                description: 'Robust server-side solutions for your business needs',
                                features: [
                                    'Node.js applications',
                                    'API development',
                                    'Database integration',
                                    'Authentication systems'
                                ],
                                image: {
                                    dataUrl: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=600&q=80'
                                }
                            }
                        ]
                    },
                    {
                        id: '2',
                        title: 'Mobile Apps',
                        icon: 'fas fa-mobile-alt',
                        description: 'Cross-platform mobile applications for iOS and Android',
                        services: [
                            {
                                id: '201',
                                title: 'React Native Apps',
                                description: 'Build once, deploy everywhere with native performance',
                                features: [
                                    'iOS and Android apps',
                                    'Single codebase',
                                    'Native performance',
                                    'Third-party integrations'
                                ],
                                image: {
                                    dataUrl: 'https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=600&q=80'
                                }
                            }
                        ]
                    }
                ];
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            const servicesCard = document.getElementById('servicesCard');
            const servicesSection = document.getElementById('servicesSection');
            
            // Load services immediately
            loadServicesIntoCard();
            
            // Intersection Observer to trigger animation
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        if (!servicesCard.classList.contains('active')) {
                            servicesCard.classList.add('active');
                        }
                    }
                });
            }, { 
                threshold: 0.2,
                rootMargin: '0px 0px -100px 0px'
            });
            
            observer.observe(servicesSection);
            
            function loadServicesIntoCard() {
                const categories = ServiceDB.getAll();
                
                if (categories.length === 0) {
                    servicesCard.innerHTML = '<p>No services available yet.</p>';
                    return;
                }
                
                let html = '';
                
                categories.forEach(category => {
                    if (category.services && category.services.length > 0) {
                        html += `
                            <div class="service-category" data-category-id="${category.id}">
                                <div class="category-header">
                                    <i class="${category.icon} category-icon"></i>
                                    <h3 class="category-title">${category.title}</h3>
                                </div>
                                <p class="category-description">${category.description}</p>
                                <div class="services-grid">
                        `;
                        
                        category.services.forEach(service => {
                            let imageHtml = '';
                            if (service.image && service.image.dataUrl) {
                                imageHtml = `<img src="${service.image.dataUrl}" alt="${service.title}" class="service-image">`;
                            }
                            
                            let featuresHtml = '';
                            if (service.features && service.features.length > 0) {
                                featuresHtml = `
                                    <ul class="service-features">
                                        ${service.features.map(feature => `<li>${feature}</li>`).join('')}
                                    </ul>
                                `;
                            }
                            
                            html += `
                                <div class="service-item" 
                                    data-service-id="${service.id}" 
                                    onclick="navigateToService('${service.id}', '${category.id}')">
                                    ${imageHtml}
                                    <h4 class="service-name">${service.title}</h4>
                                    <p class="service-description">${service.description}</p>
                                    ${featuresHtml}
                                </div>
                            `;
                        });
                        
                        html += `
                                </div>
                                <button class="read-more-btn" onclick="navigateToCategory('${category.id}')">
                                    Explore More ${category.title} Services
                                </button>
                            </div>
                        `;
                    }
                });
                
                servicesCard.innerHTML = html;
            }
        });

        // Global navigation functions
        function navigateToService(serviceId, categoryId) {
            console.log(`Navigating to service ${serviceId} in category ${categoryId}`);
            // In your implementation, this would navigate to services.html
            // window.location.href = `services.html#category-${categoryId}-service-${serviceId}`;
            alert(`Would navigate to service ${serviceId} in category ${categoryId}`);
        }

        function navigateToCategory(categoryId) {
            console.log(`Navigating to category ${categoryId}`);
            // In your implementation, this would navigate to services.html
            // window.location.href = `services.html#category-${categoryId}`;
            alert(`Would navigate to category ${categoryId}`);
        }
    </script>
</body>
</html>
