<!DOCTYPE html>
<html>
    <head>
        <title>Compass AEPED</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="../css/user-profile.css">
    </head>
    <body>
        <div class="profile-container">
            <div class="profile-section">
                <h2>Profile Picture</h2>
                <p>1122Update your profile picture</p>
                
                <div class="profile-picture-container">
                    <div class="profile-picture" id="profilePicture">
                        <span id="profileInitial">G</span>
                        <input type="file" id="profileImageUpload" accept="image/*" style="display: none;">
                        <label for="profileImageUpload" class="camera-icon">
                            <i class="material-icons">photo_camera</i>
                        </label>
                    </div>
                    <p>Click the camera icon to upload a new profile picture</p>
                </div>
            </div>

            <div class="profile-section">
                <h2>Personal Information</h2>
                <p>Update your personal information</p>
                
                <div class="profile-info">
                    <h3>Full Name</h3>
                    <div class="editable-field" id="nameField">
                        <span class="field-value">Guest</span>
                        <input type="text" class="field-input" value="Gedion Amsalu" style="display: none;">
                        <button class="edit-btn"><i class="material-icons">edit</i></button>
                    </div>
                    
                    <h3>Email</h3>
                    <div class="readonly-field" id="emailField">
                        <span class="field-value">guest@gmail.com</span>
                    </div>
                </div>
            </div>

            <button class="save-btn" id="saveChanges">Save Changes</button>
        </div>

        <script src="../js/profile-script.js"></script>
    </body>
</html>
